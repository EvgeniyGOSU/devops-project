all:
  children:
    k8s_cluster:
      children:
        master:
          hosts:
            master-node:
              ansible_host: 192.168.29.137
              ansible_user: k8s
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        workers:
          hosts:
            worker-node:
              ansible_host: 192.168.29.136
              ansible_user: k8s
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
  vars:
    ansible_become: yes
    ansible_become_method: sudo
    proxy_env:
      http_proxy: http://127.0.0.1:8080
      https_proxy: http://127.0.0.1:8080
      no_proxy: localhost,127.0.0.1,10.96.0.0/12,10.244.0.0/16,.svc,.cluster.local,192.168.0.0/16
