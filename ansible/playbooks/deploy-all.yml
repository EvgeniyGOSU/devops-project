---
# ============================================================
# Полный деплой Kubernetes кластера и всех компонентов
# ============================================================

- name: 1. Setup containerd on all nodes
  import_playbook: setup-containerd.yml

- name: 2. Initialize Kubernetes Master
  import_playbook: init-cluster.yml

- name: 3. Get kubeconfig
  import_playbook: get-kubeconfig.yml

- name: 4. Join Worker to Cluster
  import_playbook: join-worker.yml

- name: 5. Install Flannel CNI
  import_playbook: install-cni.yml

- name: 6. Install additional tools (optional)
  import_playbook: install-tools.yml

- name: 7. Final Verification
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    ansible_become: no
  
  tasks:
    - name: Wait for all nodes to be Ready
      shell: |
        export KUBECONFIG=~/.kube/config
        kubectl wait --for=condition=ready nodes --all --timeout=120s 2>&1
        kubectl get nodes -o wide 2>&1
      register: nodes_status
      ignore_errors: yes
      become: no

    - name: Display final cluster status
      debug:
        msg: |
          ====================================
          🎉 Kubernetes Cluster Ready!
          ====================================
          {{ nodes_status.stdout }}
          
          🌐 Access URLs:
          ArgoCD:      https://192.168.29.137:30080
          Uptime Kuma: http://192.168.29.137:30081
          Gitea:       http://192.168.29.137:30083
          Grafana:     http://192.168.29.137:30091 (admin/admin123)
          Prometheus:  http://192.168.29.137:30090
          Ingress:     http://192.168.29.137:30070
          ====================================
