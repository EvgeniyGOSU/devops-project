---
- name: Get kubeconfig from master
  hosts: master
  become: yes
  
  tasks:
    - name: Fetch kubeconfig to local
      fetch:
        src: /home/k8s/.kube/config
        dest: /tmp/kubeconfig
        flat: yes

- name: Setup local kubeconfig
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    ansible_become: no
  
  tasks:
    - name: Create .kube directory
      file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: '0755'
      become: no

    - name: Copy kubeconfig
      copy:
        src: /tmp/kubeconfig
        dest: "{{ lookup('env', 'HOME') }}/.kube/config"
        mode: '0600'
      become: no

    - name: Test kubectl connection
      shell: kubectl cluster-info 2>&1
      register: cluster_info
      ignore_errors: yes
      become: no

    - name: Display cluster info
      debug:
        msg: |
          ✅ Kubeconfig installed successfully!
          {{ cluster_info.stdout }}
