apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8s-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: kubernetes-apps
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        
    - alert: PodNotReady
      expr: kube_pod_status_ready{condition="false"} > 0
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is not ready"
        
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (node) / sum(kube_node_status_allocatable_cpu_cores) by (node) * 100 > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage on node {{ $labels.node }}"
        
    - alert: HighMemoryUsage
      expr: sum(container_memory_working_set_bytes) by (node) / sum(kube_node_status_allocatable_memory_bytes) by (node) * 100 > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage on node {{ $labels.node }}"
