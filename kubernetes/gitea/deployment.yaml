---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data-pvc
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
  labels:
    app: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      initContainers:
      - name: init-config
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          mkdir -p /data/gitea/conf
          cat > /data/gitea/conf/app.ini << INI
          [cache]
          ENABLED = true
          ADAPTER = memory
          
          [session]
          PROVIDER = memory
          
          [queue]
          TYPE = level
          DATADIR = /data/gitea/queues
          
          [queue.notification-service]
          TYPE = level
          DATADIR = /data/gitea/queues/notification
          INI
          chown -R 1000:1000 /data
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: gitea
        image: gitea/gitea:1.21.4
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 22
          name: ssh
        env:
        - name: USER_UID
          value: "1000"
        - name: USER_GID
          value: "1000"
        - name: GITEA__server__DOMAIN
          value: "192.168.29.137"
        - name: GITEA__server__SSH_DOMAIN
          value: "192.168.29.137"
        - name: GITEA__server__ROOT_URL
          value: "http://192.168.29.137:30083"
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: gitea-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
  labels:
    app: gitea
spec:
  type: NodePort
  selector:
    app: gitea
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30083
    name: http
  - port: 22
    targetPort: 22
    nodePort: 30022
    name: ssh
